# Packrat Configuration
# Generated by `packrat init`

[general]
machine_name = "my-workstation"
machine_id = "a1b2c3d4"
log_level = "info"
log_file = "~/.local/share/packrat/packrat.log"

[scheduler]
enabled = true
default_interval = "1h"
quiet_hours_start = ""
quiet_hours_end = ""

[storage]
backend = "rclone"
rclone_remote = "gdrive"
remote_base_path = "packrat-backups"
bandwidth_limit = ""

[encryption]
enabled = true
key_source = "keyring"
key_file = ""

[versioning]
strategy = "snapshot"
retention_count = 50
retention_days = 30

[notifications]
enabled = false
on_failure = true
on_success = false
webhook_url = ""

# Backup Groups

[[backup]]
name = "shell-history"
paths = [
    "~/.bash_history",
    "~/.zsh_history",
    "~/.local/share/fish/fish_history",
]
encrypt = false
interval = "30m"
exclude = []

[[backup]]
name = "dotfiles"
paths = [
    "~/.bashrc",
    "~/.zshrc",
    "~/.bash_profile",
    "~/.profile",
    "~/.aliases",
    "~/.vimrc",
    "~/.tmux.conf",
    "~/.gitconfig",
    "~/.ssh/config",
]
encrypt = false
interval = "1h"
exclude = []

[[backup]]
name = "ai-configs"
paths = [
    "~/.claude/",
    "~/.gemini/",
    "~/.config/github-copilot/",
]
encrypt = true
interval = "2h"
exclude = ["*.log", "*.cache"]

[[backup]]
name = "editor-configs"
paths = [
    "~/.config/nvim/",
    "~/.config/Code/User/settings.json",
    "~/.config/Code/User/keybindings.json",
    "~/.config/Code/User/snippets/",
]
encrypt = false
interval = "1h"
exclude = ["*.cache", "workspaceStorage/"]

[[backup]]
name = "gnupg"
paths = ["~/.gnupg/"]
encrypt = true
interval = "6h"
exclude = ["*.lock", "S.gpg-agent*", "random_seed"]

# Hooks

[[hook]]
name = "dump-package-lists"
when = "pre-backup"
command = """
dpkg --get-selections > ~/.config/packrat/installed-packages.txt 2>/dev/null || true
pip list --format=freeze > ~/.config/packrat/pip-packages.txt 2>/dev/null || true
"""
timeout = "30s"
fail_action = "continue"
